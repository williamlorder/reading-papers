<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Papers</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; background: #fafafa; color: #24292f; padding: 20px; max-width: 900px; margin: 0 auto; }
h1 { font-size: 1.6rem; margin-bottom: 6px; }
.subtitle { color: #666; font-size: .9rem; margin-bottom: 20px; }
.folder { margin-bottom: 24px; }
.folder-name { font-size: 1.1rem; font-weight: 700; color: #1a7f37; padding: 8px 0; border-bottom: 1px solid #d8dee4; margin-bottom: 8px; cursor: pointer; }
.folder-name:hover { color: #116329; }
.file-list { list-style: none; }
.file-list li { padding: 8px 12px; border-radius: 8px; margin-bottom: 2px; }
.file-list li:hover { background: #f0f6fc; }
.file-list a { text-decoration: none; color: #0969da; font-size: .92rem; display: block; }
.file-list a:hover { text-decoration: underline; }
.badge { display: inline-block; font-size: .7rem; padding: 2px 6px; border-radius: 4px; margin-left: 6px; font-weight: 600; vertical-align: middle; }
.badge-html { background: #ddf4ff; color: #0969da; }
.badge-md { background: #dafbe1; color: #116329; }
.badge-annotated { background: #fff8c5; color: #6a5700; }
.loading { color: #888; padding: 20px; text-align: center; }
.empty { color: #888; padding: 40px; text-align: center; font-size: 1.1rem; }
.search { width: 100%; padding: 10px 14px; border: 1px solid #d0d7de; border-radius: 8px; font-size: .95rem; margin-bottom: 16px; outline: none; }
.search:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
.stats { color: #666; font-size: .82rem; margin-bottom: 12px; }
</style>
</head>
<body>
<h1>Reading Papers</h1>
<p class="subtitle">Push HTML files to this repo. Annotate directly on the page.</p>
<input class="search" type="text" id="search" placeholder="Search files...">
<div class="stats" id="stats"></div>
<div id="content"><div class="loading">Loading files...</div></div>

<script>
const REPO = "williamlorder/reading-papers";
const API = "https://api.github.com/repos/" + REPO + "/git/trees/main?recursive=1";

async function loadFiles() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const files = data.tree.filter(function(f) {
      return f.type === "blob" && /\.(html|htm|md)$/i.test(f.path) && f.path !== "index.html";
    });
    renderFiles(files);
  } catch(e) {
    document.getElementById("content").innerHTML = '<div class="empty">No files yet. Push HTML files to get started.</div>';
  }
}

function renderFiles(files) {
  var container = document.getElementById("content");
  var stats = document.getElementById("stats");

  if (files.length === 0) {
    container.innerHTML = '<div class="empty">No files yet. Push HTML files to get started.</div>';
    return;
  }

  // Group by folder
  var folders = {};
  files.forEach(function(f) {
    var parts = f.path.split("/");
    var folder = parts.length > 1 ? parts.slice(0, -1).join("/") : "";
    var name = parts[parts.length - 1];
    if (!folders[folder]) folders[folder] = [];
    folders[folder].push({ name: name, path: f.path });
  });

  var htmlCount = files.filter(f => /\.html?$/i.test(f.path)).length;
  var mdCount = files.filter(f => /\.md$/i.test(f.path)).length;
  stats.textContent = htmlCount + " HTML, " + mdCount + " Markdown, " + Object.keys(folders).length + " folders";

  var html = "";
  var sortedFolders = Object.keys(folders).sort();
  sortedFolders.forEach(function(folder) {
    var displayName = folder || "Root";
    html += '<div class="folder" data-folder="' + folder + '">';
    html += '<div class="folder-name">' + displayName + '</div>';
    html += '<ul class="file-list">';
    folders[folder].sort(function(a, b) { return a.name.localeCompare(b.name); }).forEach(function(f) {
      var ext = f.name.split(".").pop().toLowerCase();
      var badge = ext === "md" ? '<span class="badge badge-md">MD</span>' : '<span class="badge badge-html">HTML</span>';
      if (f.name.indexOf(".annotated.") !== -1) badge += '<span class="badge badge-annotated">Annotated</span>';
      var displayName = decodeURIComponent(f.name).replace(/\.(html|htm|md)$/i, "");
      html += '<li data-name="' + f.name.toLowerCase() + '"><a href="' + encodeURI(f.path) + '">' + displayName + badge + '</a></li>';
    });
    html += '</ul></div>';
  });

  container.innerHTML = html;
}

// Search
document.getElementById("search").addEventListener("input", function() {
  var q = this.value.toLowerCase();
  document.querySelectorAll(".file-list li").forEach(function(li) {
    li.style.display = li.getAttribute("data-name").indexOf(q) !== -1 ? "" : "none";
  });
  document.querySelectorAll(".folder").forEach(function(f) {
    var visible = f.querySelectorAll("li[style=''], li:not([style])").length;
    f.style.display = visible > 0 || !q ? "" : "none";
  });
});

loadFiles();
</script>
</body>
</html>
