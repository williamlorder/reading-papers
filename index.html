<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Papers</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; background: #fafafa; color: #24292f; padding: 20px; max-width: 900px; margin: 0 auto; }
h1 { font-size: 1.6rem; margin-bottom: 6px; }
.subtitle { color: #666; font-size: .9rem; margin-bottom: 20px; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab { padding: 8px 16px; border-radius: 8px; border: 1px solid #d0d7de; background: white; cursor: pointer; font-size: .9rem; font-weight: 600; }
.tab.active { background: #0969da; color: white; border-color: #0969da; }
.tab .count { font-weight: 400; opacity: .7; margin-left: 4px; }
.file-list { list-style: none; }
.file-list li { padding: 10px 14px; border-radius: 8px; margin-bottom: 3px; }
.file-list li:hover { background: #f0f6fc; }
.file-list a { text-decoration: none; color: #0969da; font-size: .92rem; display: block; }
.file-list a:hover { text-decoration: underline; }
.badge { display: inline-block; font-size: .7rem; padding: 2px 6px; border-radius: 4px; margin-left: 6px; font-weight: 600; vertical-align: middle; }
.badge-html { background: #ddf4ff; color: #0969da; }
.badge-md { background: #dafbe1; color: #116329; }
.loading { color: #888; padding: 20px; text-align: center; }
.empty { color: #888; padding: 40px; text-align: center; font-size: 1rem; }
.search { width: 100%; padding: 10px 14px; border: 1px solid #d0d7de; border-radius: 8px; font-size: .95rem; margin-bottom: 12px; outline: none; }
.search:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
</style>
</head>
<body>
<h1>Reading Papers</h1>
<p class="subtitle">Drag files into folders. Annotate directly on the page.</p>
<input class="search" type="text" id="search" placeholder="Search files...">
<div class="tabs" id="tabs">
  <div class="tab active" data-section="Reading">Reading<span class="count" id="c-Reading"></span></div>
  <div class="tab" data-section="output">Output<span class="count" id="c-output"></span></div>
  <div class="tab" data-section="markdown">Markdown<span class="count" id="c-markdown"></span></div>
</div>
<div id="content"><div class="loading">Loading...</div></div>

<script>
var REPO = "williamlorder/reading-papers";
var API = "https://api.github.com/repos/" + REPO + "/git/trees/main?recursive=1";

var SECTIONS = {
  Reading: { exts: /\.html?$/i },
  output: { exts: /\.html?$/i },
  markdown: { exts: /\.md$/i }
};

var allFiles = {};
var currentTab = "Reading";

async function loadFiles() {
  try {
    var res = await fetch(API);
    if (!res.ok) throw new Error(res.status);
    var data = await res.json();
    var tree = data.tree.filter(function(f) {
      return f.type === "blob" && f.path !== "index.html" && f.path !== "push.sh" && f.path !== "sync.sh";
    });

    Object.keys(SECTIONS).forEach(function(key) {
      var sec = SECTIONS[key];
      allFiles[key] = tree.filter(function(f) {
        return f.path.startsWith(key + "/") && sec.exts.test(f.path);
      });
      var el = document.getElementById("c-" + key);
      if (el) el.textContent = "(" + allFiles[key].length + ")";
    });

    renderSection(currentTab);
  } catch(e) {
    document.getElementById("content").innerHTML = '<div class="empty">No files yet.</div>';
  }
}

function renderSection(key) {
  var container = document.getElementById("content");
  var files = allFiles[key] || [];
  if (files.length === 0) {
    container.innerHTML = '<div class="empty">This folder is empty.</div>';
    return;
  }
  var html = '<ul class="file-list">';
  files.sort(function(a, b) { return a.path.localeCompare(b.path); }).forEach(function(f) {
    var name = f.path.split("/").pop();
    var ext = name.split(".").pop().toLowerCase();
    var badge = ext === "md" ? '<span class="badge badge-md">MD</span>' : '<span class="badge badge-html">HTML</span>';
    var displayName = decodeURIComponent(name).replace(/\.(html|htm|md)$/i, "");
    html += '<li data-name="' + name.toLowerCase() + '"><a href="' + encodeURI(f.path) + '">' + displayName + badge + '</a></li>';
  });
  html += '</ul>';
  container.innerHTML = html;
}

document.getElementById("tabs").addEventListener("click", function(e) {
  var tab = e.target.closest(".tab");
  if (!tab) return;
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
  tab.classList.add("active");
  currentTab = tab.getAttribute("data-section");
  renderSection(currentTab);
});

document.getElementById("search").addEventListener("input", function() {
  var q = this.value.toLowerCase();
  document.querySelectorAll(".file-list li").forEach(function(li) {
    li.style.display = li.getAttribute("data-name").indexOf(q) !== -1 ? "" : "none";
  });
});

loadFiles();
</script>
</body>
</html>
